name: Sync new episodes

on:
  schedule:
    # Times are UTC. Paris is UTC+2 in summer (CEST), UTC+1 in winter (CET).
    # Cron may be delayed by a few minutes during GitHub peak hours.
    #
    # Audio drop window — Complorama publishes Friday evening, biweekly:
    - cron: '0 18 * * 5'   # Fri 18:00 UTC = ~20:00 Paris (audio sync)
    - cron: '0 8 * * 6'    # Sat 08:00 UTC = ~10:00 Paris (catch late drops)
    #
    # YouTube back-fill window — the video edit usually ships within a week:
    - cron: '0 10 * * 1'   # Mon 10:00 UTC = ~12:00 Paris
    - cron: '0 10 * * 4'   # Thu 10:00 UTC = ~12:00 Paris
    #
    # The script is idempotent: each run is a no-op when nothing's new, so
    # running weekly instead of strictly biweekly costs nothing extra and
    # also catches off-schedule special episodes.
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Append new episodes from RSS + back-fill YouTube
        run: node scripts/sync-new-episodes.mjs

      - name: Mirror episode images locally
        run: node scripts/download-episode-images.mjs

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add complorama/assets/episodes complorama/episodes-data.js
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(complorama): auto-sync new episodes + YouTube links"
            git push
          fi

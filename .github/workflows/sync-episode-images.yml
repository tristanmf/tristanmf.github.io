name: Sync episode images

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download images and rewrite episodes-data.js
        run: node scripts/download-episode-images.mjs

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add complorama/assets/episodes complorama/episodes-data.js
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(complorama): sync episode images from Radio France"
            git push
          fi

// ---------- HLS video hook ----------
function useHls(src) {
  const ref = useRef(null);
  useEffect(() => {
    const video = ref.current;
    if (!video || !src) return;
    let hls;
    const isHls = /\.m3u8(\?|$)/i.test(src);
    if (!isHls) {
      video.src = src;
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
    } else if (window.Hls && window.Hls.isSupported()) {
      hls = new window.Hls({ enableWorker: true });
      hls.loadSource(src);
      hls.attachMedia(video);
    } else {
      video.src = src;
    }
    const tryPlay = () => {video.play().catch(() => {});};
    video.addEventListener('canplay', tryPlay);
    return () => {
      video.removeEventListener('canplay', tryPlay);
      if (hls) hls.destroy();
    };
  }, [src]);
  return ref;
}

// ---------- Obfuscated mail link (anti-spam) ----------
// Email stored as base64 split parts. Assembled only on user interaction.
const MAIL_USER_B64 = "cHJvZGlnZS1jbGFpcnMuNHA="; // "prodige-clairs.4p"
const MAIL_DOMAIN_B64 = "aWNsb3VkLmNvbQ=="; // "icloud.com"
function decodeMail() {
  try {
    return atob(MAIL_USER_B64) + String.fromCharCode(64) + atob(MAIL_DOMAIN_B64);
  } catch (e) {return "";}
}
function MailLink({ subject, children, className, style }) {
  const handleClick = (e) => {
    e.preventDefault();
    const addr = decodeMail();
    const q = subject ? "?subject=" + encodeURIComponent(subject) : "";
    window.location.href = "mai" + "lto:" + addr + q;
  };
  return (
    <a href="#contact" onClick={handleClick} className={className} style={style} rel="nofollow">
      {children}
    </a>);

}

// ---------- BlurText ----------
function BlurText({ text, className = "", delay = 100, direction = "bottom", as = "h1", splitBy = "word" }) {
  const [visible, setVisible] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {setVisible(true);io.disconnect();}
    }, { threshold: 0.2 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const tokens = splitBy === 'word' ? text.split(' ') : text.split('');
  const Tag = as;
  const fromY = direction === 'bottom' ? 50 : -50;
  return (
    <Tag ref={ref} className={className}>
      {tokens.map((t, i) => {
        const isLast = i === tokens.length - 1;
        const isWordSplit = splitBy === 'word';
        return (
          <React.Fragment key={i}>
            <mot.span
              style={{ display: 'inline-block', willChange: 'transform,filter,opacity' }}
              initial={{ filter: 'blur(10px)', opacity: 0, y: fromY }}
              animate={visible ? { filter: 'blur(0px)', opacity: 1, y: 0 } : {}}
              transition={{
                duration: 0.7,
                delay: i * delay / 1000,
                ease: [0.2, 0.7, 0.2, 1]
              }}>
              
              {t === ' ' ? '\u00A0' : t}
            </mot.span>
            {isWordSplit && !isLast ?
            <span style={{ display: 'inline-block', width: '0.2em' }} aria-hidden="true" /> :
            null}
          </React.Fragment>);

      })}
    </Tag>);

}

// ---------- Fade-in wrapper ----------
function FadeIn({ children, delay = 0, y = 20, className = "" }) {
  const kids = React.Children.map(children, (c, i) =>
  React.isValidElement(c) ? React.cloneElement(c, { key: c.key || `fi-${i}` }) : c
  );
  return (
    <mot.div
      initial={{ filter: 'blur(10px)', opacity: 0, y }}
      whileInView={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
      viewport={{ once: true, amount: 0.3 }}
      transition={{ duration: 0.6, delay, ease: [0.2, 0.7, 0.2, 1] }}
      className={className}>
      
      {kids}
    </mot.div>);

}

// ---------- Navbar ----------
function Navbar() {
  const links = [{ l: "Accueil", h: "#top" }, { l: "Médias", h: "#projets" }, { l: "Productions", h: "#productions" }, { l: "Conférences", h: "#conferences" }, { l: "À propos", h: "#apropos" }];
  const [active, setActive] = React.useState("#top");
  React.useEffect(() => {
    const ids = ["top", "projets", "productions", "conferences", "apropos", "contact"];
    const sections = ids.map(id => document.getElementById(id)).filter(Boolean);
    if (!sections.length) return;
    const io = new IntersectionObserver((entries) => {
      const visible = entries.filter(e => e.isIntersecting).sort((a,b) => b.intersectionRatio - a.intersectionRatio);
      if (visible[0]) setActive("#" + visible[0].target.id);
    }, { rootMargin: "-40% 0px -50% 0px", threshold: [0, 0.1, 0.25, 0.5] });
    sections.forEach(s => io.observe(s));
    return () => io.disconnect();
  }, []);
  return (
    <nav className="fixed top-4 left-0 right-0 z-50 px-4 md:px-8 lg:px-16 py-3">
      <div className="flex items-center justify-between">

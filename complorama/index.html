    return <window.EpisodesWall />;
  }

  function mount() {
    if (typeof window.EpisodesWall === 'undefined' || typeof window.EpisodeVisual === 'undefined') {

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  mount();
